<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#62b6e8" />
  <title>Doodle Pop</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Doodle Pop" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="frame">
    <canvas id="game" width="390" height="780"></canvas>
    <div id="hint">drag to aim &middot; release to pop</div>
  </div>

  <script src="game.js"></script>
  <script>
    // Register service worker for offline / installable PWA.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err =>
          console.warn('SW registration failed:', err)
        );
      });
    }
  </script>
</body>
</html>
